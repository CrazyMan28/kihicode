<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kihicode | Live Session Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #050505; color: #e5e5e5; }
        .glass { background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .terminal-glow { box-shadow: 0 0 30px rgba(34, 211, 238, 0.1); }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <!-- Header -->
    <header class="h-16 flex items-center justify-between px-8 border-b border-white/5 glass z-50">
        <div class="flex items-center space-x-4">
            <div class="w-10 h-10 bg-cyan-600 rounded-xl flex items-center justify-center terminal-glow">
                <i data-lucide="monitor" class="text-white w-6 h-6"></i>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tighter">KIHICODE <span class="text-cyan-500">LIVE</span></h1>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest">Local Network Monitor</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <div id="statusBadge" class="flex items-center space-x-2 px-3 py-1 bg-green-500/10 rounded-full border border-green-500/20">
                <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
                <span class="text-[11px] font-bold text-green-500 uppercase">Streaming</span>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1 flex overflow-hidden p-6 gap-6">
        <!-- Live Chat -->
        <section class="flex-1 flex flex-col glass rounded-2xl overflow-hidden">
            <div class="p-4 border-b border-white/5 flex items-center justify-between bg-white/5">
                <span class="text-xs font-bold text-cyan-500 uppercase tracking-widest">Agent Conversation</span>
                <i data-lucide="message-square" class="w-4 h-4 text-gray-500"></i>
            </div>
            <div id="messages" class="flex-1 overflow-y-auto p-6 space-y-6">
                <!-- Initial connection message -->
            </div>
        </section>

        <!-- Live Terminal -->
        <section class="w-[450px] flex flex-col glass rounded-2xl overflow-hidden border-cyan-500/10">
            <div class="p-4 border-b border-white/5 flex items-center justify-between bg-white/5">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Process Execution</span>
                <i data-lucide="terminal" class="w-4 h-4 text-gray-500"></i>
            </div>
            <div id="terminal" class="flex-1 overflow-y-auto p-4 text-[11px] space-y-1 bg-black/50 font-mono">
                <!-- Log output -->
            </div>
            <!-- Progress Overlay -->
            <div id="statusLine" class="p-4 border-t border-white/5 bg-cyan-500/5 flex items-center space-x-3">
                <i data-lucide="activity" class="w-4 h-4 text-cyan-500 animate-spin"></i>
                <span id="currentStatus" class="text-[10px] text-cyan-400 font-bold uppercase tracking-widest">Idle</span>
            </div>
        </section>
    </main>

    <script src="./app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
